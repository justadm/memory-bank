services:
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - .:/app

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: memory_bank
      POSTGRES_USER: memory_user
      POSTGRES_PASSWORD: memory_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

