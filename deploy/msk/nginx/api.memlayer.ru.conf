server {
    listen 80;
    server_name api.memlayer.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.memlayer.ru;

    ssl_certificate /etc/letsencrypt/live/memlayer.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/memlayer.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/api.memlayer.ru.access.log;
    error_log /var/log/nginx/api.memlayer.ru.error.log;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:18120;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
