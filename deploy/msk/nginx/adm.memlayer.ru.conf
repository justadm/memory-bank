server {
    listen 80;
    server_name adm.memlayer.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name adm.memlayer.ru;

    ssl_certificate /etc/letsencrypt/live/memlayer.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/memlayer.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/adm.memlayer.ru.access.log;
    error_log /var/log/nginx/adm.memlayer.ru.error.log;

    client_max_body_size 10m;

    # Optional second auth layer for the admin console:
    # auth_basic "MemLayer Admin";
    # auth_basic_user_file /etc/nginx/.htpasswd-memlayer-admin;

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:18120;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = / {
        proxy_pass http://127.0.0.1:18120/console/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(app\.js|styles\.css|favicon\.svg)$ {
        rewrite ^/(.*)$ /console/$1 break;
        proxy_pass http://127.0.0.1:18120;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(projects|memory|review|settings)$ {
        rewrite ^/(.*)$ /console/$1 break;
        proxy_pass http://127.0.0.1:18120;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:18120/console/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
