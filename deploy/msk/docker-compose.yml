services:
  api:
    build:
      context: ../..
    container_name: memlayer-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HOST_API_PORT:-18120}:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../../.env

  db:
    image: postgres:16
    container_name: memlayer-db
    restart: unless-stopped
    env_file:
      - ../../.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - memlayer_postgres_data:/var/lib/postgresql/data

volumes:
  memlayer_postgres_data:
