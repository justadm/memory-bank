services:
  api:
    build:
      context: ../..
    container_name: memlayer-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HOST_API_PORT:-18120}:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../../.env

  db:
    image: postgres:16
    container_name: memlayer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-memlayer}
      POSTGRES_USER: ${POSTGRES_USER:-memlayer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memlayer_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-memlayer} -d ${POSTGRES_DB:-memlayer}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - memlayer_postgres_data:/var/lib/postgresql/data

volumes:
  memlayer_postgres_data:
